<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Gwen AI Avatar</title>
<desc>Abstract avatar logo for Gwen, Shivam's personal AI assistant.</desc>

<style>
  @keyframes slowSpin  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
  @keyframes slowSpinR { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
  @keyframes pulse     { 0%,100% { opacity:0.75; } 50% { opacity:1; } }
  @keyframes floatA    { 0%,100% { transform: translateY(0px);  } 50% { transform: translateY(-6px); } }
  @keyframes floatB    { 0%,100% { transform: translateY(0px);  } 50% { transform: translateY(4px);  } }
  @keyframes twinkle   { 0%,100% { opacity:0.25; } 50% { opacity:0.9; } }

  .orbit1 { transform-origin: 200px 200px; animation: slowSpin  18s linear infinite; }
  .orbit2 { transform-origin: 200px 200px; animation: slowSpinR 28s linear infinite; }
  .orbit3 { transform-origin: 200px 200px; animation: slowSpin  40s linear infinite; }
  .core   { animation: pulse 3s ease-in-out infinite; }
  .floatA { animation: floatA 4s ease-in-out infinite; }
  .floatB { animation: floatB 5s ease-in-out infinite; }
  .tw1    { animation: twinkle 2.5s ease-in-out infinite; }
  .tw2    { animation: twinkle 3.5s ease-in-out infinite 0.8s; }
  .tw3    { animation: twinkle 2.0s ease-in-out infinite 1.4s; }
  .tw4    { animation: twinkle 4.0s ease-in-out infinite 0.3s; }
  .tw5    { animation: twinkle 3.0s ease-in-out infinite 1.9s; }
</style>

<!-- background -->
<rect width="400" height="400" fill="#FAF7F2" rx="200"/>

<!-- soft glow rings -->
<circle cx="200" cy="200" r="160" fill="#F5EFE6" opacity="0.5"/>
<circle cx="200" cy="200" r="118" fill="#EEE3D3" opacity="0.45"/>

<!-- orbit 3 — outermost, slow -->
<g class="orbit3">
  <ellipse cx="200" cy="200" rx="148" ry="46" fill="none" stroke="#E0C9A8" stroke-width="0.8" opacity="0.4" transform="rotate(-20,200,200)"/>
  <circle cx="348" cy="194" r="4"   fill="#D4A574" opacity="0.35"/>
  <circle cx="52"  cy="206" r="3"   fill="#C17D4A" opacity="0.30"/>
</g>

<!-- orbit 2 — mid -->
<g class="orbit2">
  <ellipse cx="200" cy="200" rx="118" ry="38" fill="none" stroke="#C17D4A" stroke-width="1" opacity="0.25" transform="rotate(35,200,200)"/>
  <circle cx="200" cy="82"  r="5"   fill="#C17D4A" opacity="0.50"/>
  <circle cx="200" cy="318" r="3.5" fill="#8B5E3C" opacity="0.40"/>
</g>

<!-- orbit 1 — innermost, faster -->
<g class="orbit1">
  <ellipse cx="200" cy="200" rx="90" ry="28" fill="none" stroke="#8B5E3C" stroke-width="1.2" opacity="0.30" transform="rotate(-10,200,200)"/>
  <circle cx="290" cy="200" r="6"   fill="#C17D4A" opacity="0.70"/>
  <circle cx="110" cy="200" r="4"   fill="#8B5E3C" opacity="0.50"/>
</g>

<!-- core orb layers -->
<circle cx="200" cy="200" r="68" fill="#E8D5BE" opacity="0.50"/>
<circle cx="200" cy="200" r="54" fill="#DFC4A0" opacity="0.60"/>
<circle cx="200" cy="200" r="42" fill="#C17D4A" opacity="0.85" class="core"/>
<circle cx="200" cy="200" r="32" fill="#D4956A" opacity="0.60"/>
<circle cx="200" cy="200" r="20" fill="#E8BF96" opacity="0.50"/>
<circle cx="200" cy="200" r="11" fill="#FAF7F2" opacity="0.70"/>

<!-- specular highlight -->
<circle cx="188" cy="189" r="6"   fill="#FAF7F2" opacity="0.22"/>

<!-- floating star — left -->
<g class="tw1 floatA">
  <polygon points="148,96 151,106 161,106 153,112 156,122 148,116 140,122 143,112 135,106 145,106"
           fill="#C17D4A" opacity="0.5"/>
</g>

<!-- floating star — right -->
<g class="tw2 floatB">
  <polygon points="268,90 270,97 277,97 272,101 274,108 268,104 262,108 264,101 259,97 266,97"
           fill="#8B5E3C" opacity="0.45"/>
</g>

<!-- plus sparks -->
<g class="tw3">
  <line x1="62"  y1="142" x2="62"  y2="152" stroke="#C17D4A" stroke-width="1.5" opacity="0.5"/>
  <line x1="57"  y1="147" x2="67"  y2="147" stroke="#C17D4A" stroke-width="1.5" opacity="0.5"/>
</g>
<g class="tw4 floatA">
  <line x1="338" y1="256" x2="338" y2="265" stroke="#8B5E3C" stroke-width="1.5" opacity="0.4"/>
  <line x1="333" y1="260" x2="343" y2="260" stroke="#8B5E3C" stroke-width="1.5" opacity="0.4"/>
</g>
<g class="tw5 floatB">
  <line x1="76"  y1="272" x2="76"  y2="280" stroke="#C17D4A" stroke-width="1.2" opacity="0.35"/>
  <line x1="72"  y1="276" x2="80"  y2="276" stroke="#C17D4A" stroke-width="1.2" opacity="0.35"/>
</g>

<!-- scattered particles -->
<circle cx="240" cy="112" r="3"   fill="#D4A574" class="tw1" opacity="0.50"/>
<circle cx="318" cy="152" r="2.5" fill="#C17D4A" class="tw3" opacity="0.40"/>
<circle cx="80"  cy="258" r="2"   fill="#8B5E3C" class="tw2" opacity="0.35"/>
<circle cx="316" cy="260" r="2.5" fill="#D4A574" class="tw4" opacity="0.40"/>
<circle cx="128" cy="118" r="2"   fill="#C17D4A" class="tw5" opacity="0.35"/>
<circle cx="160" cy="318" r="3"   fill="#8B5E3C" class="tw1" opacity="0.30"/>
<circle cx="264" cy="300" r="2"   fill="#D4A574" class="tw2" opacity="0.35"/>

<!-- divider -->
<rect x="168" y="344" width="64" height="0.8" rx="0.4" fill="#E0D9CF"/>

<!-- wordmark -->
<text x="200" y="366"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="20"
      font-style="italic"
      fill="#2C2825"
      opacity="0.88">Gwen</text>

<text x="200" y="382"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="9"
      letter-spacing="3"
      fill="#7A6E65"
      opacity="0.65">PERSONAL AI</text>

<text x="200" y="396"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="8"
      font-style="italic"
      fill="#A89E94"
      opacity="0.55">Shivam's digital twin</text>

</svg>
